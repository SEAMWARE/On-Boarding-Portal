name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ${{ vars.REGISTRY || 'quay.io' }}
  REPOSITORY: ${{ vars.REPOSITORY || 'seamware' }}
  PLATFORMS: linux/arm64,linux/amd64

jobs:
  generate-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.out.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - id: pr
        if: github.event_name == 'push'
        uses: actions-ecosystem/action-get-merged-pull-request@v1.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: zwaldowski/semver-release-action@v6
        if: github.event_name == 'push' && steps.pr.outputs.labels
        with:
          dry_run: true
          bump: ${{ steps.pr.outputs.labels }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version output
        id: out
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT
          fi

  # image build & push
  build-and-push:
    needs: ["generate-version"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build & Push image
        run: ./.github/scripts/build.sh --platform ${{ env.PLATFORMS }} -t ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/onboarding:latest -t ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/onboarding:${{ needs.generate-version.outputs.version }} --push .

  # github release
  git-release:
    needs: ["generate-version", "build-and-push"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: "marvinpinto/action-automatic-releases@latest"
        if: needs.generate-version.outputs.version != 'latest'
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: ${{ needs.generate-version.outputs.version }}
          prerelease: false
          title: ${{ needs.generate-version.outputs.version }}
          files: |
            LICENSE
